name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  contracts:
    name: Check Contracts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: live-poll-contract
      
      - name: Check Rust formatting
        working-directory: live-poll-contract
        run: cargo fmt -- --check
      
      - name: Run Clippy lints
        working-directory: live-poll-contract
        run: cargo clippy --all-targets --all-features -- -D warnings
      
      - name: Build contracts
        working-directory: live-poll-contract
        run: cargo build --target wasm32v1-none --release
      
      - name: Run contract tests
        working-directory: live-poll-contract
        run: cargo test --lib
  
  website:
    name: Check Website
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: live-poll-website/package-lock.json
      
      - name: Install dependencies
        working-directory: live-poll-website
        run: npm ci
      
      - name: Run ESLint
        working-directory: live-poll-website
        run: npm run lint
      
      - name: Build website
        working-directory: live-poll-website
        run: npm run build

# repo: https://github.com/pre-commit/pre-commit
# https://pre-commit.com
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: detect-private-key

  - repo: https://github.com/rust-lang/rust-clippy
    rev: v1.76.0
    hooks:
      - id: clippy
        args: ['--all-targets', '--all-features', '--', '-D', 'warnings']
        stages: [commit]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false
        stages: [commit]

      - id: cargo-test
        name: cargo test
        entry: bash -c 'cd live-poll-contract && cargo test --lib'
        language: system
        pass_filenames: false
        stages: [push]

      - id: eslint
        name: eslint
        entry: bash -c 'cd live-poll-website && npm run lint'
        language: system
        types: [javascript, jsx]
        pass_filenames: false
        stages: [commit]
